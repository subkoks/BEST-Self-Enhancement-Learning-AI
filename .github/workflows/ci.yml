name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Orchestrator Makefile helper (drift guard)
        run: make orchestrator-help

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Cache Hypothesis examples database
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .hypothesis
          key: hypothesis-${{ runner.os }}-${{ hashFiles('tests/test_properties.py') }}
          restore-keys: hypothesis-${{ runner.os }}-

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Ruff (format + lint)
        run: |
          uv run ruff format --check .
          uv run ruff check .

      - name: Mypy (strict, src + tests)
        run: uv run mypy src tests

      - name: Pytest with coverage
        run: uv run pytest -q --cov=bsela --cov-report=term-missing --cov-fail-under=99

      - name: Dogfood report and audit CLI smoke (empty store)
        run: |
          home="$(mktemp -d)"
          mkdir -p "$home/sessions" "$home/logs" "$home/reports"
          export BSELA_HOME="$home"
          uv run bsela report --stdout | grep -q "BSELA Dogfood Report"
          uv run bsela audit --weekly --stdout | grep -q "BSELA Weekly Audit"
