name: MCP

on:
  push:
    branches: [main]
    paths:
      - "mcp/**"
      - ".github/workflows/mcp.yml"
      - "src/bsela/**"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    branches: [main]
    paths:
      - "mcp/**"
      - ".github/workflows/mcp.yml"
      - "src/bsela/**"
      - "pyproject.toml"
      - "uv.lock"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install bsela onto PATH
        run: |
          uv sync --all-extras
          uv tool install --reinstall .
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify bsela on PATH
        run: bsela --help

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: pnpm install (frozen)
        working-directory: mcp
        run: pnpm install --frozen-lockfile

      - name: pnpm check (format + lint + typecheck + test)
        working-directory: mcp
        run: pnpm check

      - name: pnpm build
        working-directory: mcp
        run: pnpm build
