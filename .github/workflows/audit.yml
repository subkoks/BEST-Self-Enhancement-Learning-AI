name: Weekly Self-Audit

on:
  schedule:
    # Mondays 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check . --output-format=github

      - name: Mypy strict
        run: uv run mypy src tests

      - name: Pytest with coverage
        run: uv run pytest -q --cov=bsela --cov-report=term-missing

      - name: Stale ADRs check
        run: |
          echo "Scanning docs/decisions/*.md for a '**Status:**' header..."
          missing=$(grep -L '^- \*\*Status:\*\*' docs/decisions/*.md || true)
          if [ -n "$missing" ]; then
            echo "::warning::ADRs missing a Status line:"
            echo "$missing"
          else
            echo "All ADRs carry a **Status:** header."
          fi
