name: Weekly Self-Audit

on:
  schedule:
    # Mondays 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check . --output-format=github

      - name: Mypy strict
        run: uv run mypy src tests

      - name: Pytest with coverage
        run: uv run pytest -q --cov=bsela --cov-report=term-missing

      - name: Stale ADRs check
        run: |
          echo "Scanning docs/decisions/*.md for a '**Status:**' header..."
          missing=$(grep -L '^- \*\*Status:\*\*' docs/decisions/*.md || true)
          if [ -n "$missing" ]; then
            echo "::warning::ADRs missing a Status line:"
            echo "$missing"
          else
            echo "All ADRs carry a **Status:** header."
          fi
